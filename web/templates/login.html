<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 医院WAF管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 420px;
        }
        .login-header {
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            padding: 40px 30px;
            text-align: center;
            color: white;
        }
        .login-header h1 { font-size: 24px; margin-bottom: 8px; }
        .login-header p { font-size: 14px; opacity: 0.9; }
        .login-form { padding: 40px 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #333; font-size: 14px; font-weight: 500; }
        .form-group input { width: 100%; padding: 14px 16px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 15px; }
        .form-group input:focus { outline: none; border-color: #dc2626; }
        .captcha-group { display: flex; gap: 12px; }
        .captcha-group input { flex: 1; }
        .captcha-img {
            width: 120px; height: 46px;
            background: #f3f4f6;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 4px;
            color: #dc2626;
            cursor: pointer;
        }
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(220, 38, 38, 0.4); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-msg { background: #fee2e2; color: #dc2626; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; display: none; }
        .security-tips { background: #fef2f2; padding: 16px; border-radius: 8px; margin-top: 20px; }
        .security-tips h3 { color: #991b1b; font-size: 13px; margin-bottom: 8px; }
        .security-tips ul { list-style: none; color: #7f1d1d; font-size: 12px; }
        .security-tips li { padding: 4px 0; padding-left: 16px; position: relative; }
        .security-tips li:before { content: "•"; position: absolute; left: 0; color: #dc2626; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🛡️ 医院WAF管理系统 v1.0.0</h1>
            <p>Web应用防火墙 · 攻击防护</p>
        </div>
        <form class="login-form" onsubmit="return handleLogin(event)">
            <div class="error-msg" id="errorMsg"></div>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" autocomplete="off">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码">
            </div>
            <div class="form-group">
                <label>验证码</label>
                <div class="captcha-group">
                    <input type="text" id="captcha" placeholder="请输入验证码" maxlength="4">
                    <div class="captcha-img" id="captchaImg" onclick="refreshCaptcha()"></div>
                </div>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">登录</button>
            <div class="security-tips">
                <h3>🔐 安全提示</h3>
                <ul>
                    <li>连续5次登录失败，账号将被锁定30分钟</li>
                    <li>密码需包含大小写字母、数字和特殊字符</li>
                    <li>密码有效期90天，到期后需强制更换</li>
                </ul>
            </div>
        </form>
    </div>
    <script>
        let currentCaptcha = '';
        function refreshCaptcha() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            currentCaptcha = '';
            for (let i = 0; i < 4; i++) {
                currentCaptcha += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('captchaImg').textContent = currentCaptcha;
        }
        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const captcha = document.getElementById('captcha').value.trim().toUpperCase();
            const errorMsg = document.getElementById('errorMsg');
            const loginBtn = document.getElementById('loginBtn');
            
            if (!username || !password) {
                errorMsg.textContent = '请输入用户名和密码';
                errorMsg.style.display = 'block';
                return;
            }
            if (captcha !== currentCaptcha) {
                errorMsg.textContent = '验证码错误';
                errorMsg.style.display = 'block';
                refreshCaptcha();
                return;
            }
            loginBtn.disabled = true;
            loginBtn.textContent = '登录中...';
            errorMsg.style.display = 'none';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password, captcha})
                });
                const result = await response.json();
                if (result.success) {
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('user', JSON.stringify(result.user));
                    if (result.must_change_password) {
                        window.location.href = '/change-password';
                    } else {
                        window.location.href = '/dashboard';
                    }
                } else {
                    errorMsg.textContent = result.message;
                    errorMsg.style.display = 'block';
                    refreshCaptcha();
                }
            } catch (error) {
                errorMsg.textContent = '登录失败: ' + error.message;
                errorMsg.style.display = 'block';
            }
            loginBtn.disabled = false;
            loginBtn.textContent = '登录';
        }
        refreshCaptcha();
    </script>
</body>
</html>
