<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>审计日志 - 医院WAF管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; background: #f5f7fa; }
        .header { background: white; padding: 20px 40px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; justify-content: space-between; align-items: center; }
        .logo h1 { font-size: 20px; color: #1f2937; }
        .nav { display: flex; gap: 8px; }
        .nav a { padding: 10px 20px; text-decoration: none; color: #6b7280; border-radius: 8px; }
        .nav a:hover { background: #f3f4f6; }
        .nav a.active { background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); color: white; }
        .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }
        
        .tabs { display: flex; gap: 16px; margin-bottom: 24px; }
        .tab { padding: 12px 32px; background: white; border: 2px solid #e5e7eb; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .tab.active { background: #dc2626; color: white; border-color: #dc2626; }
        
        .panel { display: none; }
        .panel.active { display: block; }
        
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        th { background: #f8f9fa; font-weight: 600; color: #666; font-size: 13px; }
        td { font-size: 14px; color: #333; }
        
        .result-badge { padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .result-success { background: #d1fae5; color: #059669; }
        .result-failed { background: #fee2e2; color: #dc2626; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><h1>🛡️ 医院WAF管理系统 v1.0.0</h1></div>
        <nav class="nav">
            <a href="/dashboard">仪表盘</a>
            <a href="/attacks">攻击日志</a>
            <a href="/rules">规则管理</a>
            <a href="/blacklist">黑白名单</a>
            <a href="/users">用户管理</a>
            <a href="/audit" class="active">审计日志</a>
            <a href="#" onclick="logout()">退出</a>
        </nav>
    </div>
    
    <div class="container">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">登录日志</div>
            <div class="tab" onclick="switchTab('operation')">操作日志</div>
        </div>
        
        <div class="panel active" id="loginPanel">
            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>用户</th>
                            <th>结果</th>
                            <th>原因</th>
                            <th>IP地址</th>
                        </tr>
                    </thead>
                    <tbody id="loginLogsTable"></tbody>
                </table>
            </div>
        </div>
        
        <div class="panel" id="operationPanel">
            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>用户</th>
                            <th>操作</th>
                            <th>详情</th>
                            <th>IP地址</th>
                        </tr>
                    </thead>
                    <tbody id="auditLogsTable"></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + 'Panel').classList.add('active');
        }
        
        async function loadLoginLogs() {
            try {
                const response = await fetch('/api/audit/login-logs');
                const result = await response.json();
                
                if (result.success) {
                    const tbody = document.getElementById('loginLogsTable');
                    tbody.innerHTML = result.data.reverse().map(l => `
                        <tr>
                            <td>${new Date(l.login_time).toLocaleString('zh-CN')}</td>
                            <td>${l.username}</td>
                            <td><span class="result-badge result-${l.login_result}">
                                ${l.login_result === 'success' ? '成功' : '失败'}
                            </span></td>
                            <td>${l.fail_reason || '-'}</td>
                            <td>${l.ip_address}</td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('加载登录日志失败:', error);
            }
        }
        
        async function loadAuditLogs() {
            try {
                const response = await fetch('/api/audit/audit-logs');
                const result = await response.json();
                
                if (result.success) {
                    const tbody = document.getElementById('auditLogsTable');
                    tbody.innerHTML = result.data.reverse().map(l => `
                        <tr>
                            <td>${new Date(l.action_time).toLocaleString('zh-CN')}</td>
                            <td>${l.username}</td>
                            <td>${l.action}</td>
                            <td>${l.action_detail}</td>
                            <td>${l.ip_address}</td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('加载操作日志失败:', error);
            }
        }
        
        function logout() {
            localStorage.removeItem('isLoggedIn');
            window.location.href = '/';
        }
        
        loadLoginLogs();
        loadAuditLogs();
    </script>
</body>
</html>
