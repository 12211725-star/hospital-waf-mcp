<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仪表盘 - 医院WAF管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; background: #f5f7fa; }
        .header { background: white; padding: 20px 40px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; justify-content: space-between; align-items: center; }
        .logo h1 { font-size: 20px; color: #1f2937; }
        .nav { display: flex; gap: 8px; }
        .nav a { padding: 10px 20px; text-decoration: none; color: #6b7280; border-radius: 8px; }
        .nav a:hover { background: #f3f4f6; }
        .nav a.active { background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); color: white; }
        .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }
        
        .alert-box { background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); color: white; padding: 24px; border-radius: 12px; margin-bottom: 32px; }
        .alert-box h2 { margin-bottom: 12px; }
        .alert-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
        .alert-stat { background: rgba(255,255,255,0.1); padding: 16px; border-radius: 8px; text-align: center; }
        .alert-stat .value { font-size: 32px; font-weight: 700; }
        .alert-stat .label { font-size: 12px; opacity: 0.9; margin-top: 4px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
        .stat-card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .stat-value { font-size: 32px; font-weight: 700; color: #1f2937; margin-bottom: 8px; }
        .stat-label { color: #6b7280; font-size: 14px; }
        .stat-card.danger .stat-value { color: #dc2626; }
        .stat-card.warning .stat-value { color: #d97706; }
        
        .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); margin-bottom: 24px; }
        .card-title { font-size: 18px; color: #1f2937; margin-bottom: 16px; font-weight: 600; }
        
        .attack-list { border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden; }
        .attack-item { padding: 16px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; }
        .attack-item:last-child { border-bottom: none; }
        .attack-info h4 { font-size: 14px; color: #1f2937; margin-bottom: 4px; }
        .attack-info p { font-size: 12px; color: #6b7280; }
        .attack-severity { padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .severity-high { background: #fee2e2; color: #dc2626; }
        .severity-medium { background: #fef3c7; color: #d97706; }
        .severity-low { background: #d1fae5; color: #059669; }
        
        .chart-container { height: 200px; display: flex; align-items: flex-end; gap: 8px; padding-top: 20px; }
        .chart-bar { flex: 1; background: linear-gradient(180deg, #dc2626 0%, #991b1b 100%); border-radius: 4px 4px 0 0; min-height: 20px; position: relative; }
        .chart-bar:hover { opacity: 0.8; }
        .chart-label { position: absolute; bottom: -24px; left: 50%; transform: translateX(-50%); font-size: 11px; color: #6b7280; white-space: nowrap; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><h1>🛡️ 医院WAF管理系统 v1.0.0</h1></div>
        <nav class="nav">
            <a href="/dashboard" class="active">仪表盘</a>
            <a href="/attacks">攻击日志</a>
            <a href="/rules">规则管理</a>
            <a href="/blacklist">黑白名单</a>
            <a href="/users">用户管理</a>
            <a href="/audit">审计日志</a>
            <a href="#" onclick="logout()">退出</a>
        </nav>
    </div>
    
    <div class="container">
        <div class="alert-box">
            <h2>⚠️ 今日安全态势</h2>
            <div class="alert-stats">
                <div class="alert-stat">
                    <div class="value" id="todayAttacks">0</div>
                    <div class="label">今日攻击</div>
                </div>
                <div class="alert-stat">
                    <div class="value" id="blockedAttacks">0</div>
                    <div class="label">已拦截</div>
                </div>
                <div class="alert-stat">
                    <div class="value" id="highRisk">0</div>
                    <div class="label">高危攻击</div>
                </div>
                <div class="alert-stat">
                    <div class="value" id="blockRate">0%</div>
                    <div class="label">拦截率</div>
                </div>
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalAttacks">0</div>
                <div class="stat-label">历史攻击总数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="enabledRules">0</div>
                <div class="stat-label">启用规则</div>
            </div>
            <div class="stat-card danger">
                <div class="stat-value" id="blacklistCount">0</div>
                <div class="stat-label">黑名单IP</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="todayLogins">0</div>
                <div class="stat-label">今日登录</div>
            </div>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
            <div class="card">
                <div class="card-title">📊 攻击类型分布</div>
                <div class="chart-container" id="attackChart"></div>
            </div>
            
            <div class="card">
                <div class="card-title">🔴 最新攻击</div>
                <div class="attack-list" id="recentAttacks"></div>
            </div>
        </div>
    </div>
    
    <script>
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const result = await response.json();
                
                if (result.success) {
                    const data = result.data;
                    document.getElementById('todayAttacks').textContent = data.today_attacks;
                    document.getElementById('blockedAttacks').textContent = data.blocked_attacks;
                    document.getElementById('highRisk').textContent = data.high_risk_attacks;
                    document.getElementById('blockRate').textContent = 
                        data.today_attacks > 0 ? Math.round(data.blocked_attacks / data.today_attacks * 100) + '%' : '0%';
                    document.getElementById('totalAttacks').textContent = data.total_attacks;
                    document.getElementById('enabledRules').textContent = data.enabled_rules + '/' + data.total_rules;
                    document.getElementById('blacklistCount').textContent = data.blacklist_count;
                    document.getElementById('todayLogins').textContent = data.today_logins;
                    
                    // 渲染攻击类型图表
                    renderChart(data.attack_types);
                }
            } catch (error) {
                console.error('加载统计失败:', error);
            }
        }
        
        function renderChart(attackTypes) {
            const chart = document.getElementById('attackChart');
            const types = Object.entries(attackTypes).sort((a, b) => b[1] - a[1]).slice(0, 8);
            const maxVal = Math.max(...types.map(t => t[1]), 1);
            
            chart.innerHTML = types.map(([type, count]) => `
                <div class="chart-bar" style="height: ${(count / maxVal) * 150}px;">
                    <div class="chart-label">${type}</div>
                </div>
            `).join('');
        }
        
        async function loadRecentAttacks() {
            try {
                const response = await fetch('/api/attacks?limit=5');
                const result = await response.json();
                
                if (result.success) {
                    const list = document.getElementById('recentAttacks');
                    list.innerHTML = result.data.map(attack => `
                        <div class="attack-item">
                            <div class="attack-info">
                                <h4>${attack.attack_type} - ${attack.source_ip}</h4>
                                <p>${attack.target_url} | ${new Date(attack.attack_time).toLocaleString('zh-CN')}</p>
                            </div>
                            <span class="attack-severity severity-${attack.severity}">
                                ${attack.severity === 'high' ? '高危' : attack.severity === 'medium' ? '中危' : '低危'}
                            </span>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('加载攻击日志失败:', error);
            }
        }
        
        function logout() {
            localStorage.removeItem('isLoggedIn');
            window.location.href = '/';
        }
        
        loadStats();
        loadRecentAttacks();
    </script>
</body>
</html>
