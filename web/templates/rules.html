<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>规则管理 - 医院WAF管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; background: #f5f7fa; }
        .header { background: white; padding: 20px 40px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; justify-content: space-between; align-items: center; }
        .logo h1 { font-size: 20px; color: #1f2937; }
        .nav { display: flex; gap: 8px; }
        .nav a { padding: 10px 20px; text-decoration: none; color: #6b7280; border-radius: 8px; }
        .nav a:hover { background: #f3f4f6; }
        .nav a.active { background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); color: white; }
        .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }
        
        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 24px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .stat-value { font-size: 28px; font-weight: 700; color: #dc2626; }
        .stat-label { color: #6b7280; font-size: 14px; margin-top: 4px; }
        
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        th { background: #f8f9fa; font-weight: 600; color: #666; font-size: 13px; }
        td { font-size: 14px; color: #333; }
        
        .toggle-switch { position: relative; width: 48px; height: 24px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; border-radius: 24px; transition: .3s; }
        .toggle-slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; border-radius: 50%; transition: .3s; }
        input:checked + .toggle-slider { background-color: #dc2626; }
        input:checked + .toggle-slider:before { transform: translateX(24px); }
        
        .severity-badge { padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .severity-high { background: #fee2e2; color: #dc2626; }
        .severity-medium { background: #fef3c7; color: #d97706; }
        .severity-low { background: #d1fae5; color: #059669; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><h1>🛡️ 医院WAF管理系统 v1.0.0</h1></div>
        <nav class="nav">
            <a href="/dashboard">仪表盘</a>
            <a href="/attacks">攻击日志</a>
            <a href="/rules" class="active">规则管理</a>
            <a href="/blacklist">黑白名单</a>
            <a href="/users">用户管理</a>
            <a href="/audit">审计日志</a>
            <a href="#" onclick="logout()">退出</a>
        </nav>
    </div>
    
    <div class="container">
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-value" id="totalRules">0</div>
                <div class="stat-label">规则总数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="enabledRules">0</div>
                <div class="stat-label">已启用</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="highRules">0</div>
                <div class="stat-label">高危规则</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="categories">0</div>
                <div class="stat-label">规则分类</div>
            </div>
        </div>
        
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>规则ID</th>
                        <th>规则名称</th>
                        <th>分类</th>
                        <th>危害等级</th>
                        <th>描述</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody id="rulesTable"></tbody>
            </table>
        </div>
    </div>
    
    <script>
        async function loadRules() {
            try {
                const response = await fetch('/api/rules');
                const result = await response.json();
                
                if (result.success) {
                    renderTable(result.data);
                    updateStats(result.data);
                }
            } catch (error) {
                console.error('加载规则失败:', error);
            }
        }
        
        function renderTable(rules) {
            const tbody = document.getElementById('rulesTable');
            tbody.innerHTML = rules.map(r => `
                <tr>
                    <td><code>${r.rule_id}</code></td>
                    <td>${r.name}</td>
                    <td>${r.category}</td>
                    <td><span class="severity-badge severity-${r.severity}">
                        ${r.severity === 'high' ? '高危' : r.severity === 'medium' ? '中危' : '低危'}
                    </span></td>
                    <td>${r.description}</td>
                    <td>
                        <label class="toggle-switch">
                            <input type="checkbox" ${r.enabled ? 'checked' : ''} onchange="toggleRule('${r.rule_id}', this.checked)">
                            <span class="toggle-slider"></span>
                        </label>
                    </td>
                </tr>
            `).join('');
        }
        
        function updateStats(rules) {
            document.getElementById('totalRules').textContent = rules.length;
            document.getElementById('enabledRules').textContent = rules.filter(r => r.enabled).length;
            document.getElementById('highRules').textContent = rules.filter(r => r.severity === 'high').length;
            
            const categories = [...new Set(rules.map(r => r.category))];
            document.getElementById('categories').textContent = categories.length;
        }
        
        async function toggleRule(ruleId, enabled) {
            try {
                const response = await fetch('/api/rules/toggle', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({rule_id: ruleId, enabled: enabled})
                });
                const result = await response.json();
                
                if (result.success) {
                    loadRules();
                } else {
                    alert(result.message);
                }
            } catch (error) {
                console.error('切换规则失败:', error);
            }
        }
        
        function logout() {
            localStorage.removeItem('isLoggedIn');
            window.location.href = '/';
        }
        
        loadRules();
    </script>
</body>
</html>
