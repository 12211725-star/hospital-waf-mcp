<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黑白名单 - 医院WAF管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; background: #f5f7fa; }
        .header { background: white; padding: 20px 40px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; justify-content: space-between; align-items: center; }
        .logo h1 { font-size: 20px; color: #1f2937; }
        .nav { display: flex; gap: 8px; }
        .nav a { padding: 10px 20px; text-decoration: none; color: #6b7280; border-radius: 8px; }
        .nav a:hover { background: #f3f4f6; }
        .nav a.active { background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); color: white; }
        .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }
        
        .tabs { display: flex; gap: 16px; margin-bottom: 24px; }
        .tab { padding: 12px 32px; background: white; border: 2px solid #e5e7eb; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .tab.active { background: #dc2626; color: white; border-color: #dc2626; }
        
        .panel { display: none; }
        .panel.active { display: block; }
        
        .toolbar { background: white; padding: 20px; border-radius: 12px; margin-bottom: 16px; display: flex; gap: 16px; align-items: center; }
        .toolbar input { padding: 10px 16px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 14px; }
        .toolbar button { padding: 10px 24px; background: #dc2626; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .toolbar button.secondary { background: #6b7280; }
        
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        th { background: #f8f9fa; font-weight: 600; color: #666; font-size: 13px; }
        td { font-size: 14px; color: #333; }
        
        .btn-delete { padding: 6px 12px; background: #fee2e2; color: #dc2626; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: white; padding: 32px; border-radius: 16px; width: 400px; }
        .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
        .modal-field { margin-bottom: 16px; }
        .modal-field label { display: block; margin-bottom: 6px; font-size: 14px; color: #333; }
        .modal-field input, .modal-field textarea { width: 100%; padding: 10px 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 14px; }
        .modal-actions { display: flex; gap: 12px; margin-top: 24px; }
        .modal-actions button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .modal-actions .cancel { background: #f3f4f6; color: #6b7280; }
        .modal-actions .confirm { background: #dc2626; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><h1>🛡️ 医院WAF管理系统 v1.0.0</h1></div>
        <nav class="nav">
            <a href="/dashboard">仪表盘</a>
            <a href="/attacks">攻击日志</a>
            <a href="/rules">规则管理</a>
            <a href="/blacklist" class="active">黑白名单</a>
            <a href="/users">用户管理</a>
            <a href="/audit">审计日志</a>
            <a href="#" onclick="logout()">退出</a>
        </nav>
    </div>
    
    <div class="container">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('blacklist')">黑名单</div>
            <div class="tab" onclick="switchTab('whitelist')">白名单</div>
        </div>
        
        <!-- 黑名单面板 -->
        <div class="panel active" id="blacklistPanel">
            <div class="toolbar">
                <input type="text" id="blacklistIp" placeholder="IP地址">
                <input type="text" id="blacklistReason" placeholder="封禁原因">
                <input type="number" id="blacklistDays" placeholder="封禁天数" value="30" style="width:100px">
                <button onclick="addToBlacklist()">添加</button>
            </div>
            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>IP地址</th>
                            <th>封禁原因</th>
                            <th>添加时间</th>
                            <th>过期时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="blacklistTable"></tbody>
                </table>
            </div>
        </div>
        
        <!-- 白名单面板 -->
        <div class="panel" id="whitelistPanel">
            <div class="toolbar">
                <input type="text" id="whitelistIp" placeholder="IP地址">
                <input type="text" id="whitelistReason" placeholder="备注">
                <button onclick="addToWhitelist()">添加</button>
            </div>
            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>IP地址</th>
                            <th>备注</th>
                            <th>添加时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="whitelistTable"></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + 'Panel').classList.add('active');
            
            if (tab === 'blacklist') loadBlacklist();
            else loadWhitelist();
        }
        
        async function loadBlacklist() {
            try {
                const response = await fetch('/api/blacklist');
                const result = await response.json();
                
                if (result.success) {
                    const tbody = document.getElementById('blacklistTable');
                    tbody.innerHTML = result.data.map(b => `
                        <tr>
                            <td><code>${b.ip}</code></td>
                            <td>${b.reason}</td>
                            <td>${new Date(b.added_time).toLocaleString('zh-CN')}</td>
                            <td>${b.expire_time ? new Date(b.expire_time).toLocaleString('zh-CN') : '永久'}</td>
                            <td><button class="btn-delete" onclick="removeFromBlacklist('${b.ip}')">删除</button></td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('加载黑名单失败:', error);
            }
        }
        
        async function addToBlacklist() {
            const ip = document.getElementById('blacklistIp').value.trim();
            const reason = document.getElementById('blacklistReason').value.trim();
            const days = parseInt(document.getElementById('blacklistDays').value) || 30;
            
            if (!ip) return alert('请输入IP地址');
            
            try {
                const response = await fetch('/api/blacklist/add', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ip, reason, expire_days: days})
                });
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('blacklistIp').value = '';
                    document.getElementById('blacklistReason').value = '';
                    loadBlacklist();
                } else {
                    alert(result.message);
                }
            } catch (error) {
                console.error('添加黑名单失败:', error);
            }
        }
        
        async function removeFromBlacklist(ip) {
            if (!confirm('确定要移除此IP吗？')) return;
            
            try {
                const response = await fetch(`/api/blacklist/${ip}`, {method: 'DELETE'});
                const result = await response.json();
                
                if (result.success) {
                    loadBlacklist();
                }
            } catch (error) {
                console.error('移除黑名单失败:', error);
            }
        }
        
        async function loadWhitelist() {
            try {
                const response = await fetch('/api/whitelist');
                const result = await response.json();
                
                if (result.success) {
                    const tbody = document.getElementById('whitelistTable');
                    tbody.innerHTML = result.data.map(w => `
                        <tr>
                            <td><code>${w.ip}</code></td>
                            <td>${w.reason}</td>
                            <td>${new Date(w.added_time).toLocaleString('zh-CN')}</td>
                            <td><button class="btn-delete" onclick="removeFromWhitelist('${w.ip}')">删除</button></td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('加载白名单失败:', error);
            }
        }
        
        async function addToWhitelist() {
            const ip = document.getElementById('whitelistIp').value.trim();
            const reason = document.getElementById('whitelistReason').value.trim();
            
            if (!ip) return alert('请输入IP地址');
            
            try {
                const response = await fetch('/api/whitelist/add', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ip, reason, expire_days: 0})
                });
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('whitelistIp').value = '';
                    document.getElementById('whitelistReason').value = '';
                    loadWhitelist();
                } else {
                    alert(result.message);
                }
            } catch (error) {
                console.error('添加白名单失败:', error);
            }
        }
        
        async function removeFromWhitelist(ip) {
            if (!confirm('确定要移除此IP吗？')) return;
            
            try {
                const response = await fetch(`/api/whitelist/${ip}`, {method: 'DELETE'});
                const result = await response.json();
                
                if (result.success) {
                    loadWhitelist();
                }
            } catch (error) {
                console.error('移除白名单失败:', error);
            }
        }
        
        function logout() {
            localStorage.removeItem('isLoggedIn');
            window.location.href = '/';
        }
        
        loadBlacklist();
    </script>
</body>
</html>
