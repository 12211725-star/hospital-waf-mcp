<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码 - 医院WAF管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); width: 100%; max-width: 500px; }
        .header { padding: 32px; text-align: center; border-bottom: 1px solid #e5e7eb; }
        .header h1 { font-size: 24px; color: #1f2937; margin-bottom: 8px; }
        .header p { font-size: 14px; color: #6b7280; }
        .form { padding: 32px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #333; font-size: 14px; font-weight: 500; }
        .form-group input { width: 100%; padding: 14px 16px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 15px; }
        .form-group input:focus { outline: none; border-color: #dc2626; }
        .error-msg { background: #fee2e2; color: #dc2626; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; display: none; }
        .success-msg { background: #d1fae5; color: #059669; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; display: none; }
        .submit-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(220, 38, 38, 0.4); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .password-tips { background: #fef2f2; padding: 16px; border-radius: 8px; margin-top: 20px; }
        .password-tips h3 { color: #991b1b; font-size: 13px; margin-bottom: 8px; }
        .password-tips ul { list-style: none; color: #7f1d1d; font-size: 12px; }
        .password-tips li { padding: 4px 0; padding-left: 16px; position: relative; }
        .password-tips li:before { content: "•"; position: absolute; left: 0; color: #dc2626; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 修改密码</h1>
            <p>为了您的账户安全，请设置新密码</p>
        </div>
        <form class="form" onsubmit="return handleChangePassword(event)">
            <div class="error-msg" id="errorMsg"></div>
            <div class="success-msg" id="successMsg"></div>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" readonly>
            </div>
            <div class="form-group">
                <label>原密码</label>
                <input type="password" id="oldPassword" placeholder="请输入原密码">
            </div>
            <div class="form-group">
                <label>新密码</label>
                <input type="password" id="newPassword" placeholder="请输入新密码">
            </div>
            <div class="form-group">
                <label>确认新密码</label>
                <input type="password" id="confirmPassword" placeholder="请再次输入新密码">
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">确认修改</button>
            <div class="password-tips">
                <h3>密码要求</h3>
                <ul>
                    <li>长度至少8位</li>
                    <li>包含大写字母 (A-Z)</li>
                    <li>包含小写字母 (a-z)</li>
                    <li>包含数字 (0-9)</li>
                    <li>包含特殊字符 (!@#$%^&*等)</li>
                </ul>
            </div>
        </form>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            document.getElementById('username').value = user.username || '';
        });
        
        async function handleChangePassword(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const old_password = document.getElementById('oldPassword').value;
            const new_password = document.getElementById('newPassword').value;
            const confirm_password = document.getElementById('confirmPassword').value;
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            const submitBtn = document.getElementById('submitBtn');
            
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            
            if (!old_password || !new_password || !confirm_password) {
                errorMsg.textContent = '请填写所有字段';
                errorMsg.style.display = 'block';
                return;
            }
            
            if (new_password !== confirm_password) {
                errorMsg.textContent = '两次输入的新密码不一致';
                errorMsg.style.display = 'block';
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = '修改中...';
            
            try {
                const response = await fetch('/api/change-password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, old_password, new_password})
                });
                const result = await response.json();
                
                if (result.success) {
                    successMsg.textContent = '密码修改成功，即将跳转到首页...';
                    successMsg.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 2000);
                } else {
                    errorMsg.textContent = result.message;
                    errorMsg.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = '确认修改';
                }
            } catch (error) {
                errorMsg.textContent = '修改失败: ' + error.message;
                errorMsg.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = '确认修改';
            }
        }
    </script>
</body>
</html>
