<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识库管理 - WAF管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px 15px 0 0 !important;
            padding: 20px;
        }
        .card-header h5 {
            margin: 0;
            font-weight: 600;
        }
        .status-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s;
        }
        .status-card:hover {
            transform: translateY(-5px);
        }
        .status-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .status-value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }
        .status-label {
            color: #6c757d;
            font-size: 14px;
        }
        .module-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
            transition: all 0.3s;
        }
        .module-card:hover {
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .module-card.active {
            border-left-color: #28a745;
        }
        .module-card.inactive {
            border-left-color: #dc3545;
        }
        .module-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .module-name {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        .module-version {
            background: #667eea;
            color: white;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 12px;
        }
        .module-info {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }
        .module-info-item {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #6c757d;
            font-size: 14px;
        }
        .module-description {
            color: #6c757d;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .module-actions {
            display: flex;
            gap: 10px;
        }
        .btn-action {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 13px;
        }
        .btn-activate {
            background: #28a745;
            color: white;
            border: none;
        }
        .btn-activate:hover {
            background: #218838;
            color: white;
        }
        .btn-deactivate {
            background: #ffc107;
            color: #000;
            border: none;
        }
        .btn-deactivate:hover {
            background: #e0a800;
            color: #000;
        }
        .btn-uninstall {
            background: #dc3545;
            color: white;
            border: none;
        }
        .btn-uninstall:hover {
            background: #c82333;
            color: white;
        }
        .badge-builtin {
            background: #17a2b8;
            color: white;
        }
        .badge-active {
            background: #28a745;
            color: white;
        }
        .badge-inactive {
            background: #dc3545;
            color: white;
        }
        .loading {
            text-align: center;
            padding: 40px;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .alert-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            min-width: 300px;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }
        .empty-state i {
            font-size: 60px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- 页面标题 -->
        <div class="card">
            <div class="card-header">
                <h5><i class="bi bi-database"></i> 知识库管理</h5>
            </div>
        </div>

        <!-- 知识库状态 -->
        <div class="card">
            <div class="card-body">
                <h6 class="mb-3"><i class="bi bi-graph-up"></i> 知识库状态</h6>
                <div class="row" id="statusCards">
                    <div class="col-md-4">
                        <div class="status-card">
                            <div class="status-icon text-primary">
                                <i class="bi bi-shield-lock"></i>
                            </div>
                            <div class="status-value" id="coreRules">-</div>
                            <div class="status-label">核心规则</div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="status-card">
                            <div class="status-icon text-success">
                                <i class="bi bi-puzzle"></i>
                            </div>
                            <div class="status-value" id="activeModules">-</div>
                            <div class="status-label">激活模块</div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="status-card">
                            <div class="status-icon text-info">
                                <i class="bi bi-list-check"></i>
                            </div>
                            <div class="status-value" id="totalRules">-</div>
                            <div class="status-label">总规则数</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 已安装模块 -->
        <div class="card">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h6 class="mb-0"><i class="bi bi-box-seam"></i> 已安装模块</h6>
                    <div>
                        <button class="btn btn-primary btn-sm" onclick="refreshModules()">
                            <i class="bi bi-arrow-clockwise"></i> 刷新
                        </button>
                        <button class="btn btn-success btn-sm ms-2" onclick="importModule()">
                            <i class="bi bi-download"></i> 导入模块
                        </button>
                    </div>
                </div>
                <div id="modulesList">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>加载中...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 提示框 -->
    <div id="alertContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 页面加载时获取知识库状态和模块列表
        document.addEventListener('DOMContentLoaded', function() {
            loadStatus();
            loadModules();
        });

        // 加载知识库状态
        async function loadStatus() {
            try {
                const response = await fetch('/api/knowledge-base/status');
                const data = await response.json();
                
                document.getElementById('coreRules').textContent = data.core_rules || 0;
                document.getElementById('activeModules').textContent = data.active_modules?.length || 0;
                document.getElementById('totalRules').textContent = data.total_rules || 0;
            } catch (error) {
                console.error('加载状态失败:', error);
                showAlert('danger', '加载知识库状态失败');
            }
        }

        // 加载模块列表
        async function loadModules() {
            try {
                const response = await fetch('/api/knowledge-base/modules');
                const data = await response.json();
                
                const modulesList = document.getElementById('modulesList');
                
                if (!data.modules || data.modules.length === 0) {
                    modulesList.innerHTML = `
                        <div class="empty-state">
                            <i class="bi bi-inbox"></i>
                            <p>暂无已安装的模块</p>
                        </div>
                    `;
                    return;
                }
                
                let html = '';
                data.modules.forEach(module => {
                    const isActive = module.active;
                    const isBuiltin = module.builtin;
                    
                    html += `
                        <div class="module-card ${isActive ? 'active' : 'inactive'}">
                            <div class="module-header">
                                <div class="module-name">
                                    ${module.module_name || module.module_id}
                                    <span class="badge ${isBuiltin ? 'badge-builtin' : 'badge-secondary'} ms-2">
                                        ${isBuiltin ? '内置' : '自定义'}
                                    </span>
                                    <span class="badge ${isActive ? 'badge-active' : 'badge-inactive'} ms-1">
                                        ${isActive ? '已激活' : '未激活'}
                                    </span>
                                </div>
                                <span class="module-version">v${module.version || '1.0.0'}</span>
                            </div>
                            <div class="module-info">
                                <div class="module-info-item">
                                    <i class="bi bi-list-ol"></i>
                                    <span>${module.rules_count || 0} 条规则</span>
                                </div>
                                <div class="module-info-item">
                                    <i class="bi bi-person"></i>
                                    <span>${module.author || '未知'}</span>
                                </div>
                                <div class="module-info-item">
                                    <i class="bi bi-calendar"></i>
                                    <span>${module.create_date || '未知'}</span>
                                </div>
                            </div>
                            <div class="module-description">
                                ${module.description || '暂无描述'}
                            </div>
                            <div class="module-actions">
                                ${isActive ? 
                                    `<button class="btn btn-action btn-deactivate" onclick="deactivateModule('${module.module_id}')" ${isBuiltin ? 'disabled' : ''}>
                                        <i class="bi bi-pause-circle"></i> 停用
                                    </button>` :
                                    `<button class="btn btn-action btn-activate" onclick="activateModule('${module.module_id}')">
                                        <i class="bi bi-play-circle"></i> 激活
                                    </button>`
                                }
                                ${!isBuiltin ? 
                                    `<button class="btn btn-action btn-uninstall" onclick="uninstallModule('${module.module_id}')">
                                        <i class="bi bi-trash"></i> 卸载
                                    </button>` : ''
                                }
                                <button class="btn btn-action btn-outline-primary" onclick="viewModuleDetails('${module.module_id}')">
                                    <i class="bi bi-eye"></i> 详情
                                </button>
                            </div>
                        </div>
                    `;
                });
                
                modulesList.innerHTML = html;
            } catch (error) {
                console.error('加载模块失败:', error);
                showAlert('danger', '加载模块列表失败');
            }
        }

        // 激活模块
        async function activateModule(moduleId) {
            if (!confirm(`确定要激活模块 "${moduleId}" 吗？`)) {
                return;
            }
            
            try {
                const response = await fetch(`/api/knowledge-base/modules/${moduleId}/activate`, {
                    method: 'POST'
                });
                const data = await response.json();
                
                if (data.success) {
                    showAlert('success', data.message);
                    loadStatus();
                    loadModules();
                } else {
                    showAlert('danger', data.message || '激活失败');
                }
            } catch (error) {
                console.error('激活模块失败:', error);
                showAlert('danger', '激活模块失败');
            }
        }

        // 停用模块
        async function deactivateModule(moduleId) {
            if (!confirm(`确定要停用模块 "${moduleId}" 吗？`)) {
                return;
            }
            
            try {
                const response = await fetch(`/api/knowledge-base/modules/${moduleId}/deactivate`, {
                    method: 'POST'
                });
                const data = await response.json();
                
                if (data.success) {
                    showAlert('success', data.message);
                    loadStatus();
                    loadModules();
                } else {
                    showAlert('danger', data.message || '停用失败');
                }
            } catch (error) {
                console.error('停用模块失败:', error);
                showAlert('danger', '停用模块失败');
            }
        }

        // 卸载模块
        async function uninstallModule(moduleId) {
            if (!confirm(`确定要卸载模块 "${moduleId}" 吗？此操作不可恢复！`)) {
                return;
            }
            
            try {
                const response = await fetch(`/api/knowledge-base/modules/${moduleId}`, {
                    method: 'DELETE'
                });
                const data = await response.json();
                
                if (data.success) {
                    showAlert('success', data.message);
                    loadStatus();
                    loadModules();
                } else {
                    showAlert('danger', data.message || '卸载失败');
                }
            } catch (error) {
                console.error('卸载模块失败:', error);
                showAlert('danger', '卸载模块失败');
            }
        }

        // 查看模块详情
        async function viewModuleDetails(moduleId) {
            try {
                const response = await fetch(`/api/knowledge-base/modules/${moduleId}`);
                const data = await response.json();
                
                if (data.success) {
                    const module = data.module;
                    alert(`模块详情:\n\n名称: ${module.module_name}\n版本: ${module.version}\n作者: ${module.author}\n规则数: ${module.rules_count}\n描述: ${module.description}`);
                } else {
                    showAlert('danger', '获取模块详情失败');
                }
            } catch (error) {
                console.error('获取模块详情失败:', error);
                showAlert('danger', '获取模块详情失败');
            }
        }

        // 刷新模块列表
        function refreshModules() {
            loadStatus();
            loadModules();
            showAlert('info', '已刷新');
        }

        // 导入模块
        function importModule() {
            alert('模块导入功能开发中，敬请期待！');
        }

        // 显示提示框
        function showAlert(type, message) {
            const alertContainer = document.getElementById('alertContainer');
            const alertId = 'alert-' + Date.now();
            
            const alertHtml = `
                <div id="${alertId}" class="alert alert-${type} alert-dismissible fade show alert-toast" role="alert">
                    <i class="bi bi-${type === 'success' ? 'check-circle' : type === 'danger' ? 'exclamation-circle' : 'info-circle'}"></i>
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            
            alertContainer.innerHTML += alertHtml;
            
            // 3秒后自动关闭
            setTimeout(() => {
                const alertEl = document.getElementById(alertId);
                if (alertEl) {
                    alertEl.remove();
                }
            }, 3000);
        }
    </script>
</body>
</html>
